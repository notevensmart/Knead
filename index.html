<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Knead offers accessible mental health services, therapy, training, and a clear way to connect."
    >
    <title>Knead | Mental Health Services</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" aria-label="Primary">
      <a class="brand" href="index.html" aria-label="Knead home">
        <img src="assets/logo/knead-logo-transparent.png" alt="Knead">
        <svg class="brand-tagline" viewBox="0 0 228 18" aria-hidden="true" focusable="false">
          <text x="0" y="14" textLength="228" lengthAdjust="spacing">mental health services</text>
        </svg>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main id="main">
      <section class="hero calm-hero" id="top" aria-labelledby="hero-title">
        <div class="hero-intro">
          <h1 id="hero-title">Care that makes room.</h1>
        </div>

        <div class="hero-composition" aria-hidden="true">
          <figure class="reflection-card reflection-card-one">
            <img
              src="assets/posts/cropped/i-miss-my-old-problems-tight.png"
              alt=""
              width="375"
              height="522"
              draggable="false"
            >
          </figure>
          <figure class="reflection-card reflection-card-two">
            <img
              src="assets/posts/cropped/some-days-surviving-is-enough-tight.png"
              alt=""
              width="360"
              height="510"
              draggable="false"
            >
          </figure>
          <figure class="reflection-card reflection-card-three">
            <img
              src="assets/posts/cropped/its-okay-to-take-up-space-tight.png"
              alt=""
              width="377"
              height="511"
              draggable="false"
            >
          </figure>

          <div class="hero-video-wrap">
            <video
              class="hero-video"
              autoplay
              loop
              playsinline
              preload="metadata"
              poster="assets/video/calm-hero-poster.png"
            >
              <source src="assets/video/calm-hero.mp4" type="video/mp4">
            </video>
          </div>

          <figure class="reflection-card reflection-card-four">
            <img
              src="assets/posts/cropped/healed-people-heal-people-tight.png"
              alt=""
              width="400"
              height="431"
              draggable="false"
            >
          </figure>
          <figure class="reflection-card reflection-card-five">
            <img
              src="assets/posts/cropped/progress-not-perfection-tight.png"
              alt=""
              width="365"
              height="440"
              draggable="false"
            >
          </figure>
        </div>
      </section>

      <script>
        (() => {
          const heroVideo = document.querySelector(".hero-video");
          const motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");

          if (!heroVideo) {
            return;
          }

          const syncHeroMotion = () => {
            heroVideo.muted = false;
            heroVideo.volume = 1;

            if (motionQuery.matches) {
              heroVideo.pause();
              heroVideo.removeAttribute("autoplay");
              return;
            }

            heroVideo.setAttribute("autoplay", "");
            heroVideo.play().catch(() => {});
          };

          syncHeroMotion();
          window.addEventListener("pointerdown", syncHeroMotion, { once: true });
          window.addEventListener("keydown", syncHeroMotion, { once: true });

          if (motionQuery.addEventListener) {
            motionQuery.addEventListener("change", syncHeroMotion);
          } else {
            motionQuery.addListener(syncHeroMotion);
          }
        })();
      </script>

    </main>
  </body>
</html>
