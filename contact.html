<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Contact Knead by email or Instagram."
    >
    <title>Contact | Knead</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" aria-label="Primary">
      <a class="brand" href="index.html" aria-label="Knead home">
        <img src="assets/logo/knead-logo-exact.png" alt="Knead">
        <svg class="brand-tagline" viewBox="0 0 228 18" aria-hidden="true" focusable="false">
          <text x="0" y="14" textLength="228" lengthAdjust="spacing">mental health services</text>
        </svg>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </header>

    <main id="main">
      <section class="contact-section page-contact" id="contact" aria-labelledby="contact-title">
        <div class="contact-copy">
          <p class="eyebrow">Contact</p>
          <h2 id="contact-title">Connect with Knead.</h2>
          <p>
            Send a note to begin the conversation or follow along on Instagram.
          </p>
        </div>

        <div class="contact-actions" aria-label="Contact options">
          <a
            class="icon-action primary-contact"
            href="mailto:kneadspace@gmail.com"
            aria-label="Email Knead"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M4 6h16v12H4z"></path>
              <path d="m4 7 8 6 8-6"></path>
            </svg>
          </a>
          <span
            class="icon-action is-disabled"
            role="img"
            aria-label="Phone number not available yet"
            aria-disabled="true"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.91.32 1.79.59 2.63a2 2 0 0 1-.45 2.11L8 9.71a16 16 0 0 0 6.29 6.29l1.25-1.25a2 2 0 0 1 2.11-.45c.84.27 1.72.47 2.63.59A2 2 0 0 1 22 16.92z"></path>
            </svg>
          </span>
          <a
            class="icon-action"
            href="https://www.instagram.com/kneadsocial"
            target="_blank"
            rel="noreferrer"
            aria-label="Follow Knead on Instagram"
          >
            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M17.5 6.5h.01"></path>
            </svg>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
